workflows:
  android-release:
    name: BTCmarketpro Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.19.6
      java: 17
      android_signing:
        - btcmarketpro_keystore
      groups:
        - btcmarketpro_env
      vars:
        PACKAGE_NAME: "com.btcmorning.btcmarketpro"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up Flutter
        script: |
          flutter --version
          flutter doctor

      - name: Get packages
        script: flutter pub get

      - name: Generate app icons from logo
        script: |
          pip3 install Pillow
          python3 << 'EOF'
          from PIL import Image
          import os

          sizes = {
            "mipmap-mdpi": 48,
            "mipmap-hdpi": 72,
            "mipmap-xhdpi": 96,
            "mipmap-xxhdpi": 144,
            "mipmap-xxxhdpi": 192,
          }

          logo = Image.open("logo.png").convert("RGBA")

          for folder, size in sizes.items():
            path = f"android/app/src/main/res/{folder}"
            os.makedirs(path, exist_ok=True)
            img = logo.resize((size, size), Image.LANCZOS)
            img.save(f"{path}/ic_launcher.png")
            img.save(f"{path}/ic_launcher_round.png")
            print(f"✅ {folder}: {size}x{size}")
          EOF

      - name: Generate native splash
        script: flutter pub run flutter_native_splash:create

      - name: Analyze code
        script: flutter analyze --no-fatal-warnings

      - name: Build AAB (Google Play)
        script: |
          flutter build appbundle \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/apk/release/app-release.apk

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true