workflows:
  android-release:
    name: BTCmarketpro Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.24.5
      java: 17
      android_signing:
        - btcmarketpro_keystore
      groups:
        - btcmarketpro_env
      vars:
        PACKAGE_NAME: "com.btcmorning.btcmarketpro"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up Flutter
        script: |
          flutter --version
          flutter doctor

      - name: Get packages
        script: flutter pub get

      - name: Generate splash screen
        script: |
          cd $CM_BUILD_DIR
          dart run flutter_native_splash:create

      - name: Generate app icons from logo
        script: |
          cd $CM_BUILD_DIR
          pip3 install Pillow
          python3 - << 'EOF'
          import os, sys
          from PIL import Image

          build_dir = os.environ.get("CM_BUILD_DIR", ".")
          logo_path = os.path.join(build_dir, "assets/logo.png")

          if not os.path.exists(logo_path):
              print("ERROR: logo.png not found")
              sys.exit(1)

          sizes = {
            "mipmap-mdpi": 48,
            "mipmap-hdpi": 72,
            "mipmap-xhdpi": 96,
            "mipmap-xxhdpi": 144,
            "mipmap-xxxhdpi": 192,
          }

          logo = Image.open(logo_path).convert("RGBA")

          # Boşlukları kırp
          bbox = logo.getbbox()
          if bbox:
              logo = logo.crop(bbox)

          # %90 büyüklükte ortala
          def make_icon(img, size):
              canvas = Image.new("RGBA", (size, size), (7, 19, 48, 255))
              icon_size = int(size * 0.90)
              img_resized = img.resize((icon_size, icon_size), Image.LANCZOS)
              offset = (size - icon_size) // 2
              canvas.paste(img_resized, (offset, offset), img_resized)
              return canvas

          for folder, size in sizes.items():
            path = os.path.join(build_dir, "android/app/src/main/res/" + folder)
            os.makedirs(path, exist_ok=True)
            icon = make_icon(logo, size)
            icon.save(path + "/ic_launcher.png")
            icon.save(path + "/ic_launcher_round.png")
            print("OK " + folder + ": " + str(size) + "x" + str(size))
          EOF

      - name: Create local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > $CM_BUILD_DIR/android/local.properties
          cat $CM_BUILD_DIR/android/local.properties

      - name: Debug flutter path
        script: |
          echo "FLUTTER_ROOT: $FLUTTER_ROOT"
          ls $FLUTTER_ROOT/packages/flutter_tools/gradle/
          cat $CM_BUILD_DIR/android/local.properties

      - name: Build AAB (Google Play)
        script: |
          cd $CM_BUILD_DIR
          flutter build appbundle \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

          echo "--- AAB Search ---"
          find $CM_BUILD_DIR -name "*.aab" 2>/dev/null

          AAB=$(find $CM_BUILD_DIR -name "*.aab" | head -1)
          if [ -z "$AAB" ]; then
            echo "ERROR: No AAB found!"
            exit 1
          fi

          mkdir -p $CM_BUILD_DIR/output
          cp "$AAB" $CM_BUILD_DIR/output/app-release.aab
          echo "Copied to: $CM_BUILD_DIR/output/app-release.aab"

      - name: Build APK (Test)
        script: |
          cd $CM_BUILD_DIR
          flutter build apk \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

          echo "--- APK Search ---"
          find $CM_BUILD_DIR -name "*.apk" 2>/dev/null

          APK=$(find $CM_BUILD_DIR -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi

          cp "$APK" $CM_BUILD_DIR/output/app-release.apk
          echo "Copied to: $CM_BUILD_DIR/output/app-release.apk"

    artifacts:
      - output/app-release.aab
      - output/app-release.apk

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true