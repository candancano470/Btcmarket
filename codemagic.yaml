workflows:
  android-release:
    name: BTCMarketPro Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.27.3
      java: 17
      android_signing:
        - btcmarketpro

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Flutter Kontrolü
        script: |
          flutter --version
          flutter doctor -v

      - name: Paketleri Yükle
        script: flutter pub get

      - name: Splash Screen Oluştur
        script: |
          cd $CM_BUILD_DIR
          dart run flutter_native_splash:create

      - name: Uygulama İkonları Oluştur
        script: |
          cd $CM_BUILD_DIR
          pip3 install Pillow
          python3 - << 'EOF'
          import os, sys
          from PIL import Image

          build_dir = os.environ.get("CM_BUILD_DIR", ".")
          logo_path = os.path.join(build_dir, "assets/logo.png")

          if not os.path.exists(logo_path):
              print("ERROR: logo.png bulunamadı!")
              sys.exit(1)

          sizes = {
              "mipmap-mdpi":     48,
              "mipmap-hdpi":     72,
              "mipmap-xhdpi":    96,
              "mipmap-xxhdpi":  144,
              "mipmap-xxxhdpi": 192,
          }

          logo = Image.open(logo_path).convert("RGBA")
          bbox = logo.getbbox()
          if bbox:
              logo = logo.crop(bbox)

          for folder, size in sizes.items():
              path = os.path.join(build_dir, f"android/app/src/main/res/{folder}")
              os.makedirs(path, exist_ok=True)
              icon = logo.resize((size, size), Image.LANCZOS)
              icon.save(f"{path}/ic_launcher.png")
              icon.save(f"{path}/ic_launcher_round.png")
              print(f"✓ {folder}: {size}x{size}")
          EOF

      - name: local.properties Ayarla
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > $CM_BUILD_DIR/android/local.properties
          echo "flutter.versionCode=$BUILD_NUMBER" >> $CM_BUILD_DIR/android/local.properties
          echo "flutter.versionName=1.0.$BUILD_NUMBER" >> $CM_BUILD_DIR/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> $CM_BUILD_DIR/android/local.properties
          cat $CM_BUILD_DIR/android/local.properties

      - name: İmza Kontrolü
        script: |
          echo "Keystore path: $CM_KEYSTORE_PATH"
          echo "Key alias: $CM_KEY_ALIAS"
          ls -la "$CM_KEYSTORE_PATH" || echo "HATA: Keystore bulunamadı!"

      - name: AAB Derle (Google Play)
        script: |
          cd $CM_BUILD_DIR
          flutter build appbundle \
            --release \
            --build-name=1.0.$BUILD_NUMBER \
            --build-number=$BUILD_NUMBER \
            --no-tree-shake-icons

          AAB=$(find $CM_BUILD_DIR -name "*.aab" | head -1)
          if [ -z "$AAB" ]; then
            echo "HATA: AAB bulunamadı!"
            exit 1
          fi

          mkdir -p $CM_BUILD_DIR/output
          cp "$AAB" $CM_BUILD_DIR/output/app-release.aab
          echo "✓ AAB hazır"

      - name: AAB İmzala
        script: |
          AAB="$CM_BUILD_DIR/output/app-release.aab"
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore "$CM_KEYSTORE_PATH" \
            -storepass "$CM_KEYSTORE_PASSWORD" \
            -keypass "$CM_KEY_PASSWORD" \
            "$AAB" \
            "$CM_KEY_ALIAS"
          echo "✓ AAB imzalandı"
          jarsigner -verify "$AAB" && echo "✓ İmza doğrulandı" || echo "HATA: İmza doğrulanamadı!"

      - name: APK Derle (Test)
        script: |
          cd $CM_BUILD_DIR
          flutter build apk \
            --release \
            --build-name=1.0.$BUILD_NUMBER \
            --build-number=$BUILD_NUMBER \
            --no-tree-shake-icons

          APK=$(find $CM_BUILD_DIR -name "app-release.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "HATA: APK bulunamadı!"
            exit 1
          fi

          cp "$APK" $CM_BUILD_DIR/output/app-release.apk
          echo "✓ APK hazır"

      - name: APK İmzala
        script: |
          APK="$CM_BUILD_DIR/output/app-release.apk"
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore "$CM_KEYSTORE_PATH" \
            -storepass "$CM_KEYSTORE_PASSWORD" \
            -keypass "$CM_KEY_PASSWORD" \
            "$APK" \
            "$CM_KEY_ALIAS"
          echo "✓ APK imzalandı"

      - name: Build Özeti
        script: |
          echo "================================"
          echo "  BTCMarketPro Build Tamamlandı"
          echo "================================"
          echo "Version : 1.0.$BUILD_NUMBER ($BUILD_NUMBER)"
          echo "Branch  : $CM_BRANCH"
          echo "================================"
          ls -lh $CM_BUILD_DIR/output/

    artifacts:
      - output/app-release.aab
      - output/app-release.apk

    publishing:
      email:
        recipients:
          - airdroptour@gmail.com
        notify:
          success: true
          failure: true