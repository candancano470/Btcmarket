workflows:
  android-release:
    name: BTCmarketpro Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.24.5
      java: 17
      android_signing:
        - btcmarketpro_keystore
      groups:
        - btcmarketpro_env
      vars:
        PACKAGE_NAME: "com.btcmorning.btcmarketpro"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up Flutter
        script: |
          flutter --version
          flutter doctor

      - name: Get packages
        script: flutter pub get

      - name: Generate app icons from logo
        script: |
          cd $CM_BUILD_DIR
          pip3 install Pillow
          python3 - << 'EOF'
          import os, sys
          from PIL import Image

          build_dir = os.environ.get("CM_BUILD_DIR", ".")
          logo_path = os.path.join(build_dir, "assets/logo.png")
          print(f"Looking for logo at: {logo_path}")

          if not os.path.exists(logo_path):
              print(f"ERROR: logo.png not found at {logo_path}")
              sys.exit(1)

          sizes = {
            "mipmap-mdpi": 48,
            "mipmap-hdpi": 72,
            "mipmap-xhdpi": 96,
            "mipmap-xxhdpi": 144,
            "mipmap-xxxhdpi": 192,
          }

          logo = Image.open(logo_path).convert("RGBA")

          for folder, size in sizes.items():
            path = os.path.join(build_dir, f"android/app/src/main/res/{folder}")
            os.makedirs(path, exist_ok=True)
            img = logo.resize((size, size), Image.LANCZOS)
            img.save(f"{path}/ic_launcher.png")
            img.save(f"{path}/ic_launcher_round.png")
            print(f"✅ {folder}: