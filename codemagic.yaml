workflows:
  android-release:
    name: BTCmarketpro Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.19.6
      java: 17
      android_signing:
        - btcmarketpro_keystore
      groups:
        - btcmarketpro_env
      vars:
        PACKAGE_NAME: "com.btcmorning.btcmarketpro"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up Flutter
        script: |
          flutter --version
          flutter doctor

      - name: Get packages
        script: flutter pub get

      - name: Prepare assets folder
        script: |
          mkdir -p assets
          cp logo.png assets/logo.png
          ls -la assets/

      - name: Generate launcher icons
        script: flutter pub run flutter_launcher_icons

      - name: Generate native splash
        script: flutter pub run flutter_native_splash:create

      - name: Analyze code
        script: flutter analyze --no-fatal-warnings

      - name: Build AAB (Google Play)
        script: |
          flutter build appbundle \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/apk/release/app-release.apk

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true