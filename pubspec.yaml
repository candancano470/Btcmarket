name: btcmarketpro
description: BTCmarketpro - Advanced Crypto Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.8.0
  connectivity_plus: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.0

flutter_native_splash:
  color: "#071330"
  android: true
  ios: false
  fullscreen: true
  android_12:
    color: "#071330"
    icon_background_color: "#071330"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png