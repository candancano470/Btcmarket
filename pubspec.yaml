name: btcmarketpro
description: BTCMarketPro - Advanced Crypto Social Platform
publish_to: 'none'
version: 1.0.3+21

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  connectivity_plus: ^6.0.5
  file_picker: ^8.1.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.1

flutter_native_splash:
  color: "#071330"
  android: true
  ios: false
  fullscreen: true
  android_12:
    color: "#071330"
    icon_background_color: "#071330"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png